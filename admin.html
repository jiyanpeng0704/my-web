<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>碧蓝海岸 · 后台管理（增强版）</title>
    <style>
        /* ===== 与原版一致，此处省略（保持原有样式） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            background: #EBF5FB;
            color: #0F2B4B;
        }
        .hidden {
            display: none !important;
        }
        /* 登录页 */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0F2B4B, #1A5276);
            padding: 24px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 56px rgba(0, 0, 0, 0.25);
        }
        .login-box .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: #0F2B4B;
            margin-bottom: 8px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #5D7A9A;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .login-box .form-group {
            margin-bottom: 18px;
        }
        .login-box label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #D4E4ED;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #fff;
        }
        .login-box input:focus {
            border-color: #5DADE2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(93, 173, 226, 0.2);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: #E87461;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .login-box .btn-login:hover {
            background: #D45D4A;
        }
        .login-box .error-msg {
            color: #E74C3C;
            font-size: 0.85rem;
            text-align: center;
            min-height: 24px;
            margin-top: 10px;
        }
        .login-box .footer-text {
            text-align: center;
            margin-top: 16px;
            color: #8DA8C0;
            font-size: 0.8rem;
        }
        /* 后台布局 */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #0F2B4B;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            transition: transform 0.3s;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 18px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px;
        }
        .sidebar-nav .nav-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            padding: 8px 12px 6px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .sidebar-nav a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .sidebar-nav a.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: inset 3px 0 0 #E87461;
        }
        .sidebar-nav a .badge {
            margin-left: auto;
            background: #E87461;
            color: #fff;
            font-size: 0.65rem;
            padding: 0 8px;
            border-radius: 10px;
        }
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .sidebar-footer .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2471A3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
        }
        .sidebar-footer .user-info .name {
            color: #fff;
            font-weight: 500;
        }
        .sidebar-footer .user-info .role {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
        }
        .sidebar-footer .logout-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1rem;
            margin-left: auto;
        }
        .main-content {
            margin-left: 220px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-bottom: 1px solid #D4E4ED;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .page-title {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .topbar .page-title span {
            color: #5D7A9A;
            font-size: 0.85rem;
            font-weight: 400;
            margin-left: 6px;
        }
        .topbar .menu-toggle-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .page-content {
            padding: 24px;
            flex: 1;
        }
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px 24px;
            border: 1px solid #D4E4ED;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #8DA8C0;
            font-weight: 600;
        }
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 400;
            color: #0F2B4B;
        }
        .stat-card .stat-icon {
            float: right;
            font-size: 1.8rem;
            opacity: 0.2;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .dashboard-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #D4E4ED;
        }
        .dashboard-card .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .recent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4f8;
        }
        .recent-item .recent-icon {
            width: 32px;
            height: 32px;
            background: #EBF5FB;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .recent-item .recent-info {
            flex: 1;
        }
        .recent-item .recent-info .title {
            font-weight: 500;
        }
        .recent-item .recent-info .meta {
            font-size: 0.75rem;
            color: #8DA8C0;
        }
        .recent-status {
            font-size: 0.65rem;
            padding: 0 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .recent-status.pending {
            background: #FEF9E7;
            color: #B7950B;
        }
        .recent-status.replied {
            background: #E8F8F5;
            color: #1A7A5A;
        }
        /* 表格 */
        .table-container {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #D4E4ED;
            overflow: hidden;
        }
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #D4E4ED;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .table-toolbar .search-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #EBF5FB;
            border-radius: 8px;
            padding: 4px 12px;
        }
        .table-toolbar .search-box input {
            border: none;
            background: transparent;
            padding: 6px 4px;
            outline: none;
            font-size: 0.85rem;
        }
        .table-toolbar .btn-add {
            background: #E87461;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .table-toolbar .btn-add:hover {
            background: #D45D4A;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        table th {
            text-align: left;
            padding: 10px 14px;
            background: #EBF5FB;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #5D7A9A;
            border-bottom: 1px solid #D4E4ED;
        }
        table td {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f4f8;
            vertical-align: middle;
        }
        table .thumb {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            background: #EBF5FB;
        }
        table .actions button {
            border: none;
            background: none;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        table .actions .btn-edit {
            color: #2471A3;
        }
        table .actions .btn-delete {
            color: #E74C3C;
        }
        .status-badge {
            display: inline-block;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .status-badge.active {
            background: #E8F8F5;
            color: #1A7A5A;
        }
        .status-badge.draft {
            background: #F4F6F7;
            color: #7F8C8D;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8DA8C0;
        }
        .empty-state i {
            font-size: 2.5rem;
            opacity: 0.2;
            display: block;
            margin-bottom: 8px;
        }
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
            transform: scale(0.95);
            transition: 0.3s;
        }
        .modal-overlay.open .modal {
            transform: scale(1);
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 500;
        }
        .modal .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #8DA8C0;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group textarea,
        .modal .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid #D4E4ED;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .modal .form-group textarea {
            min-height: 70px;
        }
        .modal .form-group .image-preview {
            margin-top: 6px;
        }
        .modal .form-group .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            border: 1px solid #D4E4ED;
            object-fit: contain;
        }
        .modal .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #D4E4ED;
        }
        .modal .form-actions .btn-cancel {
            padding: 6px 18px;
            border: 1px solid #D4E4ED;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
        }
        .modal .form-actions .btn-submit {
            padding: 6px 20px;
            background: #E87461;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .modal .form-actions .btn-submit:hover {
            background: #D45D4A;
        }
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.85rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s;
            min-width: 200px;
        }
        .toast.success {
            background: #27AE60;
        }
        .toast.error {
            background: #E74C3C;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .topbar .menu-toggle-btn {
                display: block;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .table-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            <div id="modalBody"></div>

    <div class="toast-container" id="toastContainer"></div>

            let db = loadData();

            function loadData() {
                try {
                    const raw = localStorage.getItem(DB_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        const def = getDefaultData();
                        // 补全缺失的集合
                        for (let key in def) {
                            if (!data[key]) data[key] = def[key];
                        }
                        return data;
                    }
                } catch (e) { console.warn('Load error', e); }
                const def = getDefaultData();
                saveData(def);
                return def;
            }

            function saveData(data) {
                localStorage.setItem(DB_KEY, JSON.stringify(data));
            }

            function getCollection(name) {
                if (!db[name]) db[name] = [];
                return db[name];
            }

            function saveCollection(name, collection) {
                db[name] = collection;
                saveData(db);
            }

            function genId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            }

            function formatDate(ts) {
                const d = new Date(ts);
                return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }

            function truncate(str, len = 50) {
                return str && str.length > len ? str.slice(0, len) + '…' : str;
            }

            function toast(msg, type = 'success') {
                const container = document.getElementById('toastContainer');
                const el = document.createElement('div');
                el.className = 'toast ' + type;
                el.textContent = msg;
                container.appendChild(el);
                setTimeout(() => { el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300); }, 3000);
            }

            // 认证

            function checkAuth() {
                const saved = sessionStorage.getItem('azurecoast_admin_user');
                if (saved) {
                    try {
                        currentUser = JSON.parse(saved);
                        return true;
                    } catch (e) {}
                }
                return false;
            }

            function initLogin() {
                document.getElementById('loginForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const username = document.getElementById('loginUser').value.trim();
                    const password = document.getElementById('loginPass').value.trim();
                    const errorEl = document.getElementById('loginError');
                    const users = getCollection('users');
                    const user = users.find(u => u.username === username && u.password === password);
                    if (user) {
                        currentUser = { id: user.id, username: user.username, role: user.role };
                        sessionStorage.setItem('azurecoast_admin_user', JSON.stringify(currentUser));
                        errorEl.textContent = '';
                        document.getElementById('loginPage').classList.add('hidden');
                        document.getElementById('adminLayout').classList.remove('hidden');
                        initAdmin();
                        toast('登录成功！');
                    } else {
                        errorEl.textContent = '用户名或密码错误。';
                    }
                });
            }

            // ============================================================
            // 通用图片上传处理（返回 base64 或原值）
            // ============================================================
            function handleImageUpload(file) {
                return new Promise((resolve) => {
                    if (!file) return resolve('');
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = () => resolve('');
                    reader.readAsDataURL(file);
                });
            }

            window.saveDest = async function(id) {
                const name = document.getElementById('destName').value.trim();
                if (!name) { toast('请填写名称', 'error'); return; }
                const location = document.getElementById('destLocation').value.trim();
                const description = document.getElementById('destDesc').value.trim();
                const tags = document.getElementById('destTags').value.split(/[、,，\s]+/).filter(Boolean);
                const badge = document.getElementById('destBadge').value.trim();
                const imageFile = document.getElementById('destImageFile').files[0];
                let image = document.getElementById('destImageData').value;
                if (imageFile) {
                    image = await handleImageUpload(imageFile);
                }
                const collection = getCollection('destinations');
                if (id) {
                    const idx = collection.findIndex(d => d.id === id);
                    if (idx >= 0) {
                        collection[idx] = { ...collection[idx], name, location, description, tags, badge, image };
                    }
                } else {
                    collection.push({
                        id: genId(),
                        name,
                        location,
                        description,
                        tags,
                        badge,
                        image,
                        createdAt: Date.now()
                    });
                }
                saveCollection('destinations', collection);
                closeModal();
                toast('保存成功');
                renderPage(currentPage);
            };

                    address: document.getElementById('setAddress').value.trim(),
                    footerCopyright: document.getElementById('setCopyright').value.trim()
                };
                saveData(db);
                toast('设置已保存');
                renderPage(currentPage);
            };

            // ============================================================
            // 通用：删除、图片预览、Modal控制
            // ============================================================
            window.deleteItem = function(collection, id) {
                if (!confirm('确定删除吗？')) return;
                const items = getCollection(collection);
                const filtered = items.filter(i => i.id !== id);
                if (filtered.length === items.length) { toast('未找到', 'error'); return; }
                saveCollection(collection, filtered);
                toast('已删除');
                renderPage(currentPage);
            };

            window.previewImage = function(input, previewId) {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.getElementById(previewId);
                        img.src = e.target.result;
                        img.style.display = 'block';
                        // 同时存入隐藏域
                        const hidden = document.getElementById(input.id.replace('File', 'Data'));
                        if (hidden) hidden.value = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Modal
            window.openModal = function(title, bodyHtml) {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalBody').innerHTML = bodyHtml;
                document.getElementById('modalOverlay').classList.add('open');
            };

            window.closeModal = function() {
                document.getElementById('modalOverlay').classList.remove('open');
            };

            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });

            // ============================================================
            // 辅助：未读留言徽章
            // ============================================================
            function updateBadge() {
                const msgs = getCollection('messages');
                const pending = msgs.filter(m => m.status === 'pending').length;
                const badge = document.getElementById('msgBadge');
                if (badge) {
                    badge.textContent = pending;
                    badge.style.display = pending > 0 ? 'inline' : 'none';
                }
            }

            // ============================================================
            // 侧栏折叠
            // ============================================================
            window.toggleSidebar = function() {
                document.getElementById('sidebar').classList.toggle('open');
            };

            // ============================================================
            // 初始化
            // ============================================================
            function initAdmin() {
                document.getElementById('userName').textContent = currentUser ? currentUser.username : '管理员';
                document.getElementById('userAvatar').textContent = (currentUser ? currentUser.username : 'A')[0]
                .toUpperCase();
                updateBadge();
                navigate('dashboard');

                function updateClock() {
                    document.getElementById('topbarTime').textContent = new Date().toLocaleString('zh-CN');
                }
                updateClock();
                setInterval(updateClock, 10000);

                document.querySelectorAll('.sidebar-nav a').forEach(a => {
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        const page = this.dataset.page;
                        if (page) navigate(page);
                    });
                });

                document.addEventListener('click', function(e) {
                    const sidebar = document.getElementById('sidebar');
                    const toggleBtn = document.querySelector('.menu-toggle-btn');
                    if (window.innerWidth <= 768 && sidebar.classList.contains('open') &&
                        !sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            }

            // ============================================================
            // 启动
            // ============================================================
            if (checkAuth()) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminLayout').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('adminLayout').classList.add('hidden');
            }
            initLogin();

        })();
    </script>

</body>
</html>
